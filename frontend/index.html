<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Flashcards</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/app.js" type="module"></script>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

  <!-- ================= TOP NAVBAR ================= -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <!-- Logo -->
    <a class="navbar-brand fw-bold" href="/">
      📚 Flashcards
    </a>

    <!-- Right Side -->
    <div class="d-flex align-items-center ms-auto" id="auth-area"></div>
  </nav>

  <!-- ================= MAIN LAYOUT ================= -->
  <div class="container-fluid flex-grow-1">
    <div class="row">

      <!-- ========== SIDEBAR ========== -->
      <aside id="sidebar" class="col-md-3 col-lg-2 bg-light border-end p-3">
          <!-- Admin button will be injected dynamically -->
      </aside>

      <!-- ========== MAIN CONTENT ========== -->
      <main class="col-md-9 col-lg-10 p-4">

        <div id="cards-container" class="row g-4"></div>

        <div id="pagination" class="d-flex justify-content-center mt-4"></div>

      </main>
    </div>
  </div>

  <!-- ================= FOOTER ================= -->
  <footer class="bg-dark text-light text-center py-3 mt-auto">
    <small>
      © 2026 English Flashcards | Node.js + MongoDB
    </small>
  </footer>

  <!-- Login Modal -->
  <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="loginModalLabel">Login</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="login-form">
            <div class="mb-3">
              <label for="login-username" class="form-label">Username</label>
              <input type="text" class="form-control" id="login-username" required>
            </div>
            <div class="mb-3">
              <label for="login-password" class="form-label">Password</label>
              <input type="password" class="form-control" id="login-password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Register Modal -->
  <div class="modal fade" id="registerModal" tabindex="-1" aria-labelledby="registerModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="registerModalLabel">Register</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="register-form">
            <div class="mb-3">
              <label for="register-username" class="form-label">Username</label>
              <input type="text" class="form-control" id="register-username" required>
            </div>
            <div class="mb-3">
              <label for="register-password" class="form-label">Password</label>
              <input type="password" class="form-control" id="register-password" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Register</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Create Card Modal -->
  <div class="modal fade" id="createCardModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">
            <i class="bi bi-plus-circle me-2"></i>Create Flashcard
          </h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <form id="create-card-form">

            <div class="row g-3">

              <div class="col-md-6">
                <label class="form-label">Word</label>
                <input type="text" id="card-text" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label class="form-label">Level</label>
                <select id="card-level" class="form-select" required>
                  <option>A1</option>
                  <option>A2</option>
                  <option>B1</option>
                  <option>B2</option>
                  <option>C1</option>
                  <option>C2</option>
                </select>
              </div>

              <div class="col-12">
                <label class="form-label">Image URL</label>
                <input type="text" id="card-image" class="form-control">
              </div>

              <div class="col-md-6">
                <label class="form-label">Part of Speech</label>
                <select id="card-pos" class="form-select">
                  <option>noun</option>
                  <option>verb</option>
                  <option>adjective</option>
                  <option>adverb</option>
                  <option>phrase</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Category</label>
                <div id="card-category-container"></div>
              </div>

              <div class="col-12">
                <label class="form-label">Definition</label>
                <textarea id="card-definition" class="form-control" required></textarea>
              </div>

              <div class="col-12">
                <label class="form-label">Example</label>
                <textarea id="card-example" class="form-control" required></textarea>
              </div>

            </div>

            <button class="btn btn-success w-100 mt-4">
              <i class="bi bi-save me-2"></i>Create Card
            </button>

          </form>

        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
